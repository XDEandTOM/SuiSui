<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>直播</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/dplayer@1.26.0/dist/DPlayer.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer@1.26.0/dist/DPlayer.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
#player{width:100vw;height:100vh}
</style>
</head>
<body>
<div id="player"></div>
<script>
var dp=new DPlayer({
  container:document.getElementById('player'),
  video:{url:'',type:'customHLS',customType:{customHLS:function(v){
    if(Hls.isSupported()){var h=new Hls();h.loadSource(v.src);h.attachMedia(v);}
  }}},
  autoplay:true,volume:1,theme:'#1976D2',
});
fetch('/api/live/config').then(function(r){return r.json()}).then(function(c){
  if(c.streamUrl)dp.switchVideo({url:c.streamUrl,type:'customHLS'});
});
</script>
</body>
</html>

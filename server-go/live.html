<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>直播 - 碎碎</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #eee; font-family: -apple-system, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
.live-container { display: flex; flex: 1; overflow: hidden; }
.video-section { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
.video-section video { width: 100%; height: 100%; object-fit: contain; }
.status-badge { position: absolute; top: 16px; left: 16px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; backdrop-filter: blur(4px); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-dot.online { background: #4caf50; box-shadow: 0 0 8px #4caf50; animation: pulse 2s infinite; }
.status-dot.offline { background: #f44336; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.danmaku-overlay { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.danmaku-item { position: absolute; white-space: nowrap; color: #fff; font-size: 1rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); animation: danmakuScroll 8s linear forwards; }
@keyframes danmakuScroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
.chat-section { width: 320px; display: flex; flex-direction: column; background: rgba(20,20,20,0.95); border-left: 1px solid rgba(255,255,255,0.06); }
.chat-header { padding: 12px 16px; font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.06); }
.chat-messages { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
.chat-msg { font-size: 0.82rem; line-height: 1.4; word-break: break-word; }
.chat-author { color: #64b5f6; font-weight: 500; margin-right: 6px; }
.chat-input-row { display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
.chat-input-row input { flex: 1; background: rgba(255,255,255,0.06); border: none; border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 0.82rem; outline: none; }
.chat-input-row input::placeholder { color: rgba(255,255,255,0.3); }
.chat-input-row button { background: #1976d2; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; }
.chat-input-row button:hover { background: #1565c0; }
@media (max-width: 768px) { .chat-section { width: 100%; height: 40vh; } .live-container { flex-direction: column; } }
</style>
</head>
<body>
<div class="live-container">
  <div class="video-section">
    <video id="video" autoplay muted playsinline></video>
    <div class="status-badge"><span class="status-dot offline" id="statusDot"></span><span id="statusText">加载中...</span></div>
    <div class="danmaku-overlay" id="danmakuOverlay"></div>
  </div>
  <div class="chat-section">
    <div class="chat-header">💬 聊天</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input id="chatInput" placeholder="发送消息..." maxlength="200" />
      <button id="chatSend">发送</button>
    </div>
  </div>
</div>
<script>
const video = document.getElementById('video');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const danmakuOverlay = document.getElementById('danmakuOverlay');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');

// Load stream URL from config, then init player
fetch('/api/live/config').then(r=>r.json()).then(cfg => {
  const url = cfg.streamUrl;
  if (!url) { statusText.textContent = '未配置'; return; }
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  }
});

// Status polling
async function checkStatus() {
  try {
    const r = await fetch('/api/live/status');
    const d = await r.json();
    if (d.online) { statusDot.className='status-dot online'; statusText.textContent='直播中'; }
    else { statusDot.className='status-dot offline'; statusText.textContent='离线'; }
  } catch { statusDot.className='status-dot offline'; statusText.textContent='离线'; }
}
checkStatus(); setInterval(checkStatus, 5000);

// Chat SSE
const evtSource = new EventSource('/api/live/chat');
evtSource.onmessage = (e) => {
  const d = JSON.parse(e.data);
  // Chat message
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = '<span class="chat-author">' + esc(d.author) + '</span>' + esc(d.text);
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  // Danmaku
  addDanmaku(d.text);
};

function addDanmaku(text) {
  const el = document.createElement('div');
  el.className = 'danmaku-item';
  el.textContent = text;
  el.style.top = (10 + Math.random() * 70) + '%';
  el.style.fontSize = (0.9 + Math.random() * 0.4) + 'rem';
  danmakuOverlay.appendChild(el);
  setTimeout(() => el.remove(), 8000);
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Send chat
async function sendChat() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  try {
    await fetch('/api/live/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, author:'观众'}) });
    addDanmaku(text);
  } catch {}
}
chatSend.onclick = sendChat;
chatInput.onkeydown = (e) => { if (e.key === 'Enter') sendChat(); };
</script>
</body>
</html>
